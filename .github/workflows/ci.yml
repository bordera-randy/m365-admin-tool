name: CI — Lint & Analyse

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: PSScriptAnalyzer Lint
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Format PowerShell scripts
        shell: pwsh
        run: |
          GET-CONTENT "${{ github.workspace }}\src\M365AdminTool.ps1" -Raw |
          Invoke-Formatter -Settings "${{ github.workspace }}\.github\PSScriptAnalyzerSettings.psd1" |
          Set-Content "${{ github.workspace }}\src\M365AdminTool.ps1"

      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer `
            -Path "${{ github.workspace }}\src" `
            -Recurse `
            -Settings "${{ github.workspace }}\.github\PSScriptAnalyzerSettings.psd1" `
            -Severity @('Error', 'Warning')

          if ($results.Count -gt 0) {
            Write-Host "PSScriptAnalyzer found $($results.Count) issue(s):" -ForegroundColor Red
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
            exit 1
          } else {
            Write-Host "PSScriptAnalyzer: No errors or warnings found." -ForegroundColor Green
          }
